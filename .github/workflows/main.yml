name: Update Book Database

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Generate Book List
        run: |
          echo "[" > books.json
          find . -maxdepth 2 -not -path '*/.*' \( -name "*.pdf" -o -name "*.epub" \) | sed 's|^\./||' | while read line; do
            echo "  {\"title\": \"$(basename "$line")\", \"path\": \"$line\"}," >> books.json
          done
          sed -i '$ s/,$//' books.json
          echo "]" >> books.json

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add books.json
          git commit -m "Update books.json" || exit 0
          git push
