name: Generate Database for MyReaderApp

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Create database.json
        run: |
          # สร้างไฟล์ชื่อ database.json ตามที่แอปต้องการ
          echo "[" > database.json
          find . -maxdepth 3 -not -path '*/.*' \( -name "*.pdf" -o -name "*.epub" \) | sed 's|^\./||' | while read line; do
            # สร้าง URL ตรง (Raw Link) เพื่อให้แอปเปิดอ่านได้ทันที
            RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/${line}"
            # ปรับแต่ง JSON ให้ตรงกับที่แอปคุณเขียนไว้ (ใช้คำว่า title และ url)
            echo "  {\"title\": \"$(basename "$line")\", \"url\": \"$RAW_URL\"}," >> database.json
          done
          sed -i '$ s/,$//' database.json
          echo "]" >> database.json

      - name: Push to GitHub
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add database.json
          git commit -m "Update database.json for MyReaderApp" || exit 0
          git push
