name: Sync Database for MyReaderApp

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Generate Database
        run: |
          # สร้างไฟล์ database.json (ชื่อต้องเป๊ะตามโค้ดแอป)
          echo "[" > database.json
          find . -maxdepth 3 -not -path '*/.*' \( -name "*.pdf" -o -name "*.epub" \) | sed 's|^\./||' | while read line; do
            # สร้าง URL แบบ Raw เพื่อให้แอปดึงเนื้อหาไปโชว์ได้
            RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/${line}"
            # ใช้โครงสร้าง {"title": "...", "url": "..."} ตามที่แอปคุณเขียนไว้
            echo "  {\"title\": \"$(basename "$line")\", \"url\": \"$RAW_URL\"}," >> database.json
          done
          sed -i '$ s/,$//' database.json
          echo "]" >> database.json

      - name: Clean and Update
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # ลบไฟล์ books.json ทิ้งไปเลยเพื่อไม่ให้สับสน
          rm -f books.json
          git add database.json
          git commit -m "Update database.json and remove books.json" || exit 0
          git push
